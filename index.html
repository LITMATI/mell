<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0b0f1a;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            text-align: center;
            background: #11161f;
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid #2a3a44;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.8;
        }

        h1 {
            font-size: 2rem;
            color: #eef4ff;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .sub {
            font-size: 1rem;
            color: #9ab3d0;
            margin-bottom: 24px;
            border-bottom: 1px solid #2a3a44;
            display: inline-block;
            padding-bottom: 6px;
        }

        .message {
            background: #0c111c;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a4c55;
        }

        .message p {
            color: #cbdbe6;
            font-size: 1rem;
            line-height: 1.5;
        }

        .code-note {
            font-family: monospace;
            background: #090e17;
            padding: 8px 14px;
            border-radius: 40px;
            display: inline-block;
            color: #7fcdff;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .footer {
            margin-top: 28px;
            font-size: 0.75rem;
            color: #4a607a;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">🛠️</div>
    <h1>Технические работы</h1>
    <div class="sub">Обновление кода</div>
    <div class="message">
        <p>
            В данный момент проводятся плановые работы по обновлению серверной части и кода сайта.<br><br>
            Мы уже занимаемся улучшением, чтобы сервис стал ещё быстрее и стабильнее.<br><br>
            Пожалуйста, зайдите чуть позже.
        </p>
    </div>
    <div class="code-note">&lt; обновление кода /&gt;</div>
    <div class="footer">Спасибо за понимание</div>
</div>
</body>
</html>
